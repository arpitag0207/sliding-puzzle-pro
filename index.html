<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sliding Puzzle Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:radial-gradient(circle at bottom,#1e3c72,#0f172a 70%);
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
width:95%;
max-width:520px;
background:rgba(17,24,39,0.85);
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 0 40px rgba(59,130,246,0.4);
}

h1{
font-family:'Orbitron',sans-serif;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border-radius:25px;
border:none;
margin-bottom:15px;
background:rgba(255,255,255,0.08);
color:white;
text-align:center;
}

button{
padding:10px 18px;
margin:5px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#3b82f6,#9333ea);
color:white;
cursor:pointer;
font-weight:600;
}

button:hover{transform:scale(1.05)}

.grid{
display:grid;
gap:8px;
margin:15px 0;
}

.tile{
background:#3b82f6;
padding:20px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.empty{
background:rgba(255,255,255,0.08);
cursor:default;
}

.hidden{display:none}

.info{margin-top:10px;font-size:14px}
.message{margin-top:10px;color:#93c5fd}

.leaderboard{
margin-top:15px;
text-align:left;
font-size:14px;
}

.leaderboard h3{
text-align:center;
margin-bottom:8px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

<h1>SLIDING PUZZLE PRO</h1>

<div id="startScreen">
<input id="playerName" placeholder="Enter Gamer Name">
<br>
<button onclick="showDifficulty()">Start Game</button>
<button onclick="showLeaderboard()">Leaderboard</button>
</div>

<div id="difficultyScreen" class="hidden">
<p>Select Difficulty</p>
<button onclick="startGame(3)">Easy</button>
<button onclick="startGame(4)">Medium</button>
<button onclick="startGame(5)">Hard</button>
</div>

<div id="gameScreen" class="hidden">
<div class="info">
Time: <span id="time">0</span>s |
Moves: <span id="moves">0</span>
</div>

<div id="grid" class="grid"></div>

<button onclick="shuffle()">Shuffle</button>
<button onclick="hint()">Hint</button>
<button onclick="goBack()">Back</button>

<div id="message" class="message"></div>
</div>

<div id="leaderboardScreen" class="hidden">
<div class="leaderboard">
<h3>🏆 Top 5 Players</h3>
<div id="leaderboardList"></div>
<button onclick="goHome()">Back</button>
</div>
</div>

</div>

<script>
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<120;i++){
stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(draw);
}
draw();

let size=3;
let tiles=[];
let moves=0;
let seconds=0;
let timer=null;
let player="";

function showDifficulty(){
player=document.getElementById("playerName").value;
if(!player){alert("Enter name");return;}
document.getElementById("startScreen").classList.add("hidden");
document.getElementById("difficultyScreen").classList.remove("hidden");
}

function startGame(n){
size=n;
tiles=[];
moves=0;
seconds=0;
document.getElementById("moves").innerText=0;
document.getElementById("time").innerText=0;
document.getElementById("difficultyScreen").classList.add("hidden");
document.getElementById("gameScreen").classList.remove("hidden");

for(let i=1;i<size*size;i++) tiles.push(i);
tiles.push(0);

render();
shuffle();
startTimer();
}

function render(){
const grid=document.getElementById("grid");
grid.innerHTML="";
grid.style.gridTemplateColumns=`repeat(${size},1fr)`;
tiles.forEach((num,i)=>{
const tile=document.createElement("div");
tile.className="tile";
if(num===0){
tile.classList.add("empty");
}else{
tile.innerText=num;
tile.onclick=()=>move(i);
}
grid.appendChild(tile);
});
}

function move(i){
const empty=tiles.indexOf(0);
const valid=[empty-1,empty+1,empty-size,empty+size];
if(valid.includes(i)){
[tiles[i],tiles[empty]]=[tiles[empty],tiles[i]];
moves++;
document.getElementById("moves").innerText=moves;
render();
checkWin();
motivation();
}
}

function shuffle(){
for(let i=0;i<1000;i++){
let empty=tiles.indexOf(0);
let options=[empty-1,empty+1,empty-size,empty+size]
.filter(i=>i>=0 && i<tiles.length);
let rand=options[Math.floor(Math.random()*options.length)];
[tiles[rand],tiles[empty]]=[tiles[empty],tiles[rand]];
}
moves=0;
document.getElementById("moves").innerText=0;
render();
}

function startTimer(){
clearInterval(timer);
timer=setInterval(()=>{
seconds++;
document.getElementById("time").innerText=seconds;
},1000);
}

function checkWin(){
for(let i=0;i<tiles.length-1;i++){
if(tiles[i]!==i+1) return;
}
clearInterval(timer);
saveScore();
alert("Victory 🎉");
goHome();
}

function saveScore(){
let scores=JSON.parse(localStorage.getItem("leaderboard"))||[];
scores.push({name:player,time:seconds});
scores.sort((a,b)=>a.time-b.time);
scores=scores.slice(0,5);
localStorage.setItem("leaderboard",JSON.stringify(scores));
}

function showLeaderboard(){
document.getElementById("startScreen").classList.add("hidden");
document.getElementById("leaderboardScreen").classList.remove("hidden");
let scores=JSON.parse(localStorage.getItem("leaderboard"))||[];
let html="";
scores.forEach((s,i)=>{
html+=`${i+1}. ${s.name} - ${s.time}s<br>`;
});
document.getElementById("leaderboardList").innerHTML=
html||"No scores yet.";
}

function hint(){
let empty=tiles.indexOf(0);
let options=[empty-1,empty+1,empty-size,empty+size]
.filter(i=>i>=0 && i<tiles.length);
let rand=options[Math.floor(Math.random()*options.length)];
move(rand);
}

function motivation(){
const messages=["Good going!","So close!","You can do it!","Nice move!"];
if(moves%5===0){
document.getElementById("message").innerText=
messages[Math.floor(Math.random()*messages.length)];
}
}

function goBack(){
clearInterval(timer);
goHome();
}

function goHome(){
document.getElementById("gameScreen").classList.add("hidden");
document.getElementById("difficultyScreen").classList.add("hidden");
document.getElementById("leaderboardScreen").classList.add("hidden");
document.getElementById("startScreen").classList.remove("hidden");
}
</script>

</body>
</html>
