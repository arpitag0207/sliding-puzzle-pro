<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sliding Puzzle Pro</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#1e3c72">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    color:white;
    overflow-x:hidden;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background: radial-gradient(circle at bottom,#1e3c72,#0f172a 70%);
}

/* Star background */
#stars{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-1;
}

/* Main Container */
.container{
    width:90%;
    max-width:500px;
    background:rgba(20,25,45,0.8);
    backdrop-filter: blur(15px);
    padding:30px 20px;
    border-radius:20px;
    box-shadow:0 0 40px rgba(0,150,255,0.3);
    text-align:center;
    box-sizing:border-box;
}

/* Title */
h1{
    font-family:'Orbitron',sans-serif;
    font-size: clamp(26px, 6vw, 36px);
    letter-spacing:2px;
    margin-bottom:25px;
}

/* Input */
input{
    width:100%;
    padding:14px;
    border-radius:30px;
    border:none;
    outline:none;
    font-size:16px;
    text-align:center;
    margin-bottom:20px;
    background:rgba(255,255,255,0.08);
    color:white;
    box-shadow:0 0 15px rgba(0,150,255,0.3);
}

/* Buttons */
button{
    padding:12px 25px;
    margin:8px;
    border:none;
    border-radius:30px;
    font-weight:600;
    cursor:pointer;
    font-size:14px;
    background:linear-gradient(45deg,#3b82f6,#9333ea);
    color:white;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(147,51,234,0.6);
}

/* Responsive fix */
@media (max-width:480px){
    .container{
        padding:25px 15px;
    }
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">
    <h1>SLIDING PUZZLE PRO</h1>
    <input type="text" placeholder="Enter Gamer Name">
    <div>
        <button>Start Game</button>
        <button>Leaderboard</button>
    </div>
</div>

<script>

/* Simple Star Animation */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<120;i++){
    stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        radius: Math.random()*1.5,
        alpha: Math.random()
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";

    stars.forEach(s=>{
        ctx.globalAlpha = s.alpha;
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

</script>

</body>
</html>
